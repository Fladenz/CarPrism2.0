<div class="dashboard-container">
  <aside class="sidebar d-none d-lg-flex">
    <a routerLink="/" class="brand-logo">CarPrism</a>
    <nav class="nav flex-column w-100">
      <a routerLink="/inicio" class="nav-link"><i class="bi bi-grid-1x2-fill"></i><span>Dashboard</span></a>
      <a routerLink="/garagem" class="nav-link"><i class="bi bi-car-front-fill"></i><span>Garagem</span></a>
      <a routerLink="/cadastro-car" class="nav-link active"><i class="bi bi-plus-circle-fill"></i><span>Novo Carro</span></a>
      <a routerLink="/inicio" class="nav-link"><i class="bi bi-calendar-event"></i><span>Test-Drives</span></a>
      <a routerLink="/ajustes" class="nav-link"><i class="bi bi-gear-fill"></i><span>Ajustes</span></a>
    </nav>
  </aside>

  <main class="main-content">
    <div class="form-card">
      <div class="section-header">
        <h2>Cadastrar Nova Máquina</h2>
        <p>Faça o upload da foto e preencha os dados técnicos do veículo.</p>
      </div>

      <form #formEl (submit)="onSubmit(formEl); $event.preventDefault()">
        <div class="row g-4">
          <div class="col-12">
            <label class="form-label">Imagem do Veículo</label>
            <div
              class="image-upload-zone"
              [class.has-preview]="!!previewImage"
              [style.background-image]="previewImage ? 'url(' + previewImage + ')' : 'none'"
            >
              <input type="file" id="carFile" accept="image/*" required (change)="onFileChange($event)" />

              <div id="uploadPlaceholder" [style.display]="previewImage ? 'none' : 'flex'">
                <i class="bi bi-cloud-arrow-up-fill fs-1 text-muted"></i>
                <p class="text-white fw-bold mt-2">Clique ou arraste a foto do carro aqui</p>
                <p class="text-muted small">Formatos suportados: JPG, PNG ou WEBP</p>
              </div>
            </div>
            <p class="text-muted small">{{ selectedFileName }}</p>
          </div>

          <div class="col-md-4">
            <label class="form-label">Marca</label>
            <input type="text" class="form-control" placeholder="Ex: Chevrolet" required />
          </div>
          <div class="col-md-8">
            <label class="form-label">Modelo</label>
            <input type="text" class="form-control" placeholder="Ex: Corvette Stingray" required />
          </div>

          <div class="col-md-12">
            <label class="form-label">Preço Estimado</label>
            <div class="input-group">
              <span class="input-group-text">R$</span>
              <input type="text" class="form-control" placeholder="1.250.000" required />
            </div>
          </div>

          <div class="col-md-4">
            <label class="form-label">0 a 100 km/h (s)</label>
            <input type="text" class="form-control" placeholder="Ex: 2.9s" required />
          </div>
          <div class="col-md-4">
            <label class="form-label">Potência (cv)</label>
            <input type="text" class="form-control" placeholder="Ex: 495 cv" required />
          </div>
          <div class="col-md-4">
            <label class="form-label">Motorização</label>
            <input type="text" class="form-control" placeholder="Ex: V8 6.2L" required />
          </div>

          <div class="col-12">
            <label class="form-label">Descrição Detalhada</label>
            <textarea class="form-control" rows="4" placeholder="Fale sobre a experiência de condução e detalhes do veículo..." required></textarea>
          </div>

          <div class="col-12 mt-5">
            <button type="submit" class="btn-save">Finalizar Cadastro</button>
          </div>
        </div>
      </form>
    </div>
  </main>
</div>

<div id="toastSuccess" [style.display]="showToast ? 'block' : 'none'">
  <i class="bi bi-check-circle-fill me-2"></i> Veículo cadastrado com sucesso na garagem!
</div>
