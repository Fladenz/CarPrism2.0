<div class="dashboard-container">
  <aside class="sidebar">
    <a routerLink="/" class="brand-logo">CarPrism</a>

    <nav class="nav flex-column w-100">
      <a routerLink="/inicio" class="nav-link">
        <i class="bi bi-grid-1x2-fill"></i>
        <span>Dashboard</span>
      </a>
      <a routerLink="/garagem" class="nav-link active">
        <i class="bi bi-car-front-fill"></i>
        <span>Garagem</span>
      </a>
      <a routerLink="/cadastro-car" class="nav-link">
        <i class="bi bi-plus-circle-fill"></i>
        <span>Novo Carro</span>
      </a>
      <a routerLink="/inicio" class="nav-link">
        <i class="bi bi-calendar-event"></i>
        <span>Test-Drives</span>
      </a>
      <a routerLink="/inicio" class="nav-link">
        <i class="bi bi-gear-fill"></i>
        <span>Ajustes</span>
      </a>
    </nav>
  </aside>

  <main class="main-content">
    <header class="content-header">
      <div class="welcome-text">
        <h2>Minha Garagem</h2>
        <p>Todos os carros salvos estão aqui. Clique para ver detalhes completos.</p>
      </div>

      <div class="search-bar">
        <i class="bi bi-search text-muted"></i>
        <input
          type="text"
          placeholder="Buscar na garagem..."
          (input)="onSearchInput($event)"
        />
      </div>
    </header>

    <div class="section-title">Veículos na Garagem ({{ cars.length }})</div>

    <div class="cars-grid">
      <div class="car-card" *ngFor="let car of filteredCars" (click)="openDetails(car.id)">
        <div class="car-img-box">
          <img [src]="car.image" [alt]="car.title" />
          <div class="btn-heart-overlay" title="Favorito">
            <i class="bi bi-heart-fill"></i>
          </div>
        </div>

        <div class="car-info">
          <div class="car-title">{{ car.title }}</div>
          <div class="car-specs">{{ car.specs }}</div>
          <button class="btn-details" type="button" (click)="openDetails(car.id); $event.stopPropagation()">
            Ver detalhes
          </button>
        </div>
      </div>
    </div>
  </main>
</div>
