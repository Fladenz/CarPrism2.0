<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CarPrism - Protótipo</title>
    <!-- Link do Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Link dos Ícones do Bootstrap -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

    <style>
        :root {
            --bg-color: #050505;
            --accent-color: #9d4edd;
            --text-color: #ffffff;
            --text-muted: #b3b3b3;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            overflow-x: hidden;
            font-family: 'Segoe UI', sans-serif;
        }

        .main-container {
            min-height: 100vh;
            width: 100%;
            background-color: var(--bg-color);
        }

        /* --- Estilo do Título Principal --- */
        .site-title {
            font-weight: 800; /* Extra negrito */
            font-size: 3rem; /* Tamanho grande */
            letter-spacing: 4px; /* Espaçamento entre letras */
            text-transform: uppercase;
            background: linear-gradient(to right, #fff, var(--accent-color)); /* Gradiente no texto */
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 20px rgba(157, 78, 221, 0.5); /* Brilho roxo atrás */
            margin-bottom: 20px;
        }

        .car-image-container {
            height: 45vh;
            min-height: 300px;
            width: 100%;
            max-width: 1100px;
            border: 3px solid var(--accent-color);
            box-shadow: 0 0 20px rgba(157, 78, 221, 0.3);
            border-radius: 25px;
            overflow: hidden;
            background-color: #1a1a1a;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .car-image-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: center;
            opacity: 0;
            transition: opacity 0.5s ease-in-out;
        }

        .car-image-container img.loaded {
            opacity: 1;
        }

        .nav-arrow {
            font-size: 2rem;
            cursor: pointer;
            transition: all 0.2s;
            color: var(--accent-color);
            user-select: none;
        }

        .nav-arrow:hover {
            transform: scale(1.2);
            color: #fff;
            text-shadow: 0 0 10px var(--accent-color);
        }

        .btn-entrar {
            color: var(--text-color);
            border: 2px solid var(--accent-color);
            background: transparent;
            transition: 0.3s;
        }

        .btn-entrar:hover {
            background-color: var(--accent-color);
            color: #fff;
            box-shadow: 0 0 15px var(--accent-color);
        }

        .btn-cadastre {
            background-color: var(--accent-color);
            color: #fff;
            border: none;
            transition: 0.3s;
        }

        .btn-cadastre:hover {
            background-color: #7b2cbf;
            color: #fff;
            box-shadow: 0 0 20px rgba(157, 78, 221, 0.6);
        }

        .footer-content {
            width: 100%;
            max-width: 1200px;
        }

        .text-custom-muted {
            color: var(--text-muted);
        }

        /* --- Estilos dos Gráficos --- */
        .mini-chart-box {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(157, 78, 221, 0.3);
            border-radius: 12px;
            padding: 12px;
            width: 160px;
            margin-bottom: 15px;
            backdrop-filter: blur(5px);
        }

        .chart-label {
            font-size: 0.75rem;
            color: var(--text-muted);
            margin-bottom: 5px;
            display: block;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* --- Animações --- */

        @keyframes bar-fluctuation {
            0%, 100% { transform: scaleY(1); opacity: 0.8; }
            50% { transform: scaleY(1.15); opacity: 1; }
        }

        .bar-chart {
            display: flex;
            align-items: flex-end;
            justify-content: space-between;
            height: 40px;
            gap: 4px;
        }

        .bar {
            background: var(--accent-color);
            width: 100%;
            border-radius: 2px 2px 0 0;
            opacity: 0.8;
            transform-origin: bottom;
            animation: bar-fluctuation 3s infinite ease-in-out;
        }

        .bar:nth-child(odd) { animation-duration: 2.5s; }
        .bar:nth-child(even) { animation-duration: 3.2s; }
        .bar:nth-child(2) { animation-delay: 0.3s; }
        .bar:nth-child(4) { animation-delay: 0.7s; }

        @keyframes line-pulse {
            0%, 100% { stroke-width: 2; filter: drop-shadow(0 0 2px var(--accent-color)); }
            50% { stroke-width: 3; filter: drop-shadow(0 0 5px var(--accent-color)); }
        }

        @keyframes dot-pulse {
            0%, 100% { r: 2; opacity: 1; }
            50% { r: 3.5; opacity: 0.7; }
        }

        .line-chart svg {
            width: 100%;
            height: 40px;
            overflow: visible;
        }

        .line-path {
            fill: none;
            stroke: var(--accent-color);
            stroke-width: 2;
            stroke-linecap: round;
            filter: drop-shadow(0 0 2px var(--accent-color));
            animation: line-pulse 3s infinite ease-in-out;
        }

        .line-chart circle {
            animation: dot-pulse 3s infinite ease-in-out;
            transform-origin: center;
            transform-box: fill-box;
        }

        .line-chart circle:nth-of-type(2) { animation-delay: 1s; }
        .line-chart circle:nth-of-type(3) { animation-delay: 2s; }

    </style>
</head>
<body>

    <div class="main-container d-flex flex-column p-4 p-md-5">

        <!-- Pequeno espaço no topo, mas menor agora que temos o título -->
        <div class="mb-2" style="height: 10px;"></div>

        <!-- MEIO: Título, Imagem e Setas -->
        <div class="flex-grow-1 d-flex flex-column align-items-center pt-2 pt-md-2">

            <!-- NOVO: Título do Site -->
            <h1 class="site-title">CarPrism</h1>

            <div class="car-image-container mb-3">
                 <img id="car-img" src="" alt="Carro Exclusivo">
            </div>

            <div class="d-flex gap-5 mt-2">
                <i class="bi bi-arrow-left nav-arrow" id="btn-prev"></i>
                <i class="bi bi-arrow-right nav-arrow" id="btn-next"></i>
            </div>
        </div>

        <!-- RODAPÉ -->
        <div class="d-flex justify-content-center w-100 mt-5 pt-md-5">
            <div class="footer-content d-flex flex-column flex-md-row justify-content-between align-items-end">

                <!-- Coluna Esquerda: Gráfico + Botões -->
                <div class="d-flex flex-column mb-3 mb-md-0 align-items-center align-items-md-start">

                    <!-- Gráfico 1: Vendas Mensais (Animado) -->
                    <div class="mini-chart-box">
                        <span class="chart-label"><i class="bi bi-graph-up"></i> Vendas Mensais</span>
                        <div class="bar-chart">
                            <div class="bar" style="height: 40%;"></div>
                            <div class="bar" style="height: 65%;"></div>
                            <div class="bar" style="height: 50%;"></div>
                            <div class="bar" style="height: 85%;"></div>
                            <div class="bar" style="height: 100%;"></div>
                        </div>
                    </div>

                    <div class="d-flex flex-column gap-3">
                        <button class="btn btn-cadastre rounded-3 px-5 py-3 fw-semibold fs-5">Cadastre-se</button>
                        <button class="btn btn-entrar rounded-pill px-5 py-2 fw-bold" style="min-width: 150px;">Entrar</button>
                    </div>
                </div>

                <!-- Coluna Direita: Gráfico + Texto -->
                <div class="d-flex flex-column align-items-center align-items-md-end text-md-end text-start ps-md-4" style="max-width: 450px;">

                    <!-- Gráfico 2: Qualidade/Performance (Animado) -->
                    <div class="mini-chart-box">
                        <span class="chart-label"><i class="bi bi-speedometer2"></i> Qualidade</span>
                        <div class="line-chart">
                            <svg viewBox="0 0 100 40">
                                <path class="line-path" d="M0,35 Q20,30 40,20 T100,5" />
                                <circle cx="0" cy="35" r="2" fill="#fff" />
                                <circle cx="40" cy="20" r="2" fill="#fff" />
                                <circle cx="100" cy="5" r="2" fill="#fff" />
                            </svg>
                        </div>
                    </div>

                    <h4 class="fw-bold mb-2">Performance Pura.</h4>
                    <p class="text-custom-muted mb-0 fs-6">
                        Descubra a engenharia que desafia os limites. Seu próximo nível de direção começa aqui.
                    </p>
                </div>
            </div>
        </div>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        const carImages = [
            "https://images.unsplash.com/photo-1503376763036-066120622c74?q=80&w=2070&auto=format&fit=crop",
            "https://images.unsplash.com/photo-1617788138017-80ad40651399?q=80&w=2070&auto=format&fit=crop",
            "https://images.unsplash.com/photo-1614162692292-7ac56d7f7f1e?q=80&w=2070&auto=format&fit=crop"
        ];

        let currentIndex = 0;
        const carImgElement = document.getElementById('car-img');
        const btnPrev = document.getElementById('btn-prev');
        const btnNext = document.getElementById('btn-next');

        function updateImage() {
            carImgElement.classList.remove('loaded');
            setTimeout(() => {
                carImgElement.src = carImages[currentIndex];
            }, 300);
        }

        carImgElement.onload = function() {
            carImgElement.classList.add('loaded');
        };

        window.addEventListener('load', () => {
             carImgElement.src = carImages[currentIndex];
        });

        btnPrev.addEventListener('click', () => {
            currentIndex = (currentIndex === 0) ? carImages.length - 1 : currentIndex - 1;
            updateImage();
        });

        btnNext.addEventListener('click', () => {
            currentIndex = (currentIndex === carImages.length - 1) ? 0 : currentIndex + 1;
            updateImage();
        });
    </script>
</body>
</html>
